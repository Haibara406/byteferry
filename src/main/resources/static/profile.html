<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ByteFerry</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <h1 class="logo"><span class="accent">Byte</span>Ferry</h1>
            <div class="header-right">
                <button class="btn-link" id="back-home-btn">&larr; Back to Home</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="view" id="view-profile">
            <section class="panel fade-in">
                <!-- Profile Header Card -->
                <div class="card profile-header-card">
                    <div class="profile-header-content">
                        <div class="profile-avatar-section">
                            <div class="profile-avatar-wrap-large" id="profile-avatar-wrap">
                                <img id="profile-avatar" class="profile-avatar-large" src="" alt="avatar">
                                <div class="profile-avatar-overlay-large" id="profile-avatar-overlay">
                                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    <span>Change Avatar</span>
                                </div>
                                <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp,image/jpg" hidden>
                            </div>
                        </div>
                        <div class="profile-info-section">
                            <h2 id="profile-username-display" class="profile-username-display"></h2>
                            <div class="profile-meta">
                                <span class="profile-meta-item">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                    <span id="profile-email-display"></span>
                                </span>
                                <span class="profile-meta-item">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <span id="profile-created-display"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Edit Profile Card -->
                <div class="card" style="margin-top:20px">
                    <h3 class="section-title">Edit Profile</h3>
                    <div class="form-group">
                        <label class="label">Username</label>
                        <input class="input" type="text" id="edit-username" placeholder="Enter username">
                        <small class="muted">3-50 characters</small>
                    </div>
                    <div class="form-group">
                        <label class="label">Gender</label>
                        <div class="pill-group" id="gender-nav" style="width:100%;display:flex">
                            <button type="button" class="pill" data-gender="MALE" style="flex:1;text-align:center">Male</button>
                            <button type="button" class="pill" data-gender="FEMALE" style="flex:1;text-align:center">Female</button>
                            <button type="button" class="pill" data-gender="OTHER" style="flex:1;text-align:center">Other</button>
                            <button type="button" class="pill" data-gender="UNKNOWN" style="flex:1;text-align:center">Unknown</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="save-profile-btn">Save Changes</button>
                    <div id="profile-success" class="success-card hidden mt"></div>
                    <div id="profile-error" class="error-card hidden mt"></div>
                </div>

                <!-- Change Email Card -->
                <div class="card" style="margin-top:20px">
                    <h3 class="section-title">Change Email</h3>
                    <div class="form-group">
                        <label class="label">Current Email</label>
                        <input class="input" type="email" id="current-email-display" disabled>
                    </div>
                    <div class="form-group">
                        <label class="label">New Email</label>
                        <input class="input" type="email" id="new-email" placeholder="Enter new email">
                    </div>
                    <div class="form-group">
                        <label class="label">Verification Code</label>
                        <div class="row gap">
                            <input class="input" type="text" id="email-code" placeholder="6-digit code" maxlength="6" style="flex:1">
                            <button type="button" class="btn btn-primary btn-sm" id="send-email-code-btn">Send Code</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="change-email-btn">Change Email</button>
                    <div id="email-success" class="success-card hidden mt"></div>
                    <div id="email-error" class="error-card hidden mt"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <script src="/js/profile.js"></script>
</body>
</html>
