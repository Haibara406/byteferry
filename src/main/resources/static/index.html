<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteFerry - 跨设备传输</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <h1 class="logo"><span class="accent">Byte</span>Ferry</h1>
            <div class="header-right">
                <nav class="pill-group" id="mode-nav">
                    <button class="pill active" data-mode="quick">Quick</button>
                    <button class="pill" data-mode="session">Session</button>
                    <button class="pill hidden" data-mode="space" id="nav-space">Space</button>
                </nav>
                <div id="user-area">
                    <button class="btn btn-primary btn-sm" id="login-btn">Login</button>
                </div>
                <div id="user-info" class="hidden">
                    <span class="user-name" id="user-display"></span>
                    <button class="btn-link sm" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">

        <!-- ==================== QUICK MODE ==================== -->
        <div class="view" id="view-quick">
            <nav class="pill-group sub-nav" id="quick-nav">
                <button class="pill active" data-tab="q-send">Send</button>
                <button class="pill" data-tab="q-recv">Receive</button>
            </nav>

            <!-- Quick Send -->
            <section class="panel fade-in" id="q-send">
                <div class="type-bar" id="type-bar">
                    <button class="type-chip active" data-type="text">Text</button>
                    <button class="type-chip" data-type="image">Image</button>
                    <button class="type-chip" data-type="file">File</button>
                </div>
                <div class="input-area" id="ia-text">
                    <textarea id="q-text" class="textarea" placeholder="Paste or type text here..." rows="7"></textarea>
                </div>
                <div class="input-area hidden" id="ia-image">
                    <div class="dropzone" id="dz-image">
                        <div id="img-preview" class="preview-grid hidden"></div>
                        <div id="img-ph" class="dz-placeholder">
                            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <p>Drop images or click to select</p>
                        </div>
                        <input id="img-input" type="file" accept="image/*" multiple hidden>
                    </div>
                </div>
                <div class="input-area hidden" id="ia-file">
                    <div class="dropzone" id="dz-file">
                        <div id="file-list" class="file-list hidden"></div>
                        <div id="file-ph" class="dz-placeholder">
                            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                            <p>Drop files or click to select</p>
                            <small>Max 100MB each</small>
                        </div>
                        <input id="file-input" type="file" multiple hidden>
                    </div>
                </div>
                <label class="checkbox-row"><input type="checkbox" id="del-after"><span>Delete after download</span></label>
                <button class="btn btn-primary full" id="q-send-btn">Send</button>
                <div class="result-card hidden" id="q-result">
                    <small class="muted">Share Code</small>
                    <p class="code-display" id="q-code"></p>
                    <button class="btn-link" id="q-copy-code">Copy Code</button>
                </div>
            </section>

            <!-- Quick Receive -->
            <section class="panel fade-in hidden" id="q-recv">
                <div class="card">
                    <label class="label">Enter Share Code</label>
                    <div class="row gap">
                        <input id="qr-code" class="code-input" type="text" maxlength="8" placeholder="A7F3K9">
                        <button class="btn btn-primary" id="qr-get-btn">Get</button>
                    </div>
                </div>
                <div id="qr-result" class="hidden mt"></div>
                <div id="qr-error" class="error-card hidden mt"></div>
            </section>
        </div>

        <!-- ==================== SESSION MODE ==================== -->
        <div class="view hidden" id="view-session">
            <nav class="pill-group sub-nav" id="sess-nav">
                <button class="pill active" data-tab="s-send">Send</button>
                <button class="pill" data-tab="s-recv">Receive</button>
            </nav>

            <!-- Session Send -->
            <section class="panel fade-in" id="s-send">
                <div id="s-create" class="card center-content">
                    <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24" class="accent-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    <h2>Create a Session</h2>
                    <p class="muted">Open a persistent channel. Send multiple items with one code.</p>
                    <button class="btn btn-primary" id="s-create-btn">Create Session</button>
                </div>
                <div id="s-active" class="hidden">
                    <div class="card row spread">
                        <div><small class="muted upper">Session Code</small><p class="code-display small clickable" id="s-code"></p></div>
                        <div class="text-right"><small class="muted">Expires in</small><p class="timer" id="s-timer"></p></div>
                    </div>
                    <div class="actions-row">
                        <button class="btn-link" id="s-copy-code">Copy Code</button>
                        <button class="btn-link danger" id="s-close-btn">Close Session</button>
                    </div>
                    <!-- Unified input -->
                    <div class="composer">
                        <textarea id="s-text" class="composer-text" rows="2" placeholder="Type a message..."></textarea>
                        <div id="s-attachments" class="attach-bar hidden"></div>
                        <div class="composer-toolbar">
                            <div class="toolbar-left">
                                <button class="icon-btn" id="s-attach-file-btn" title="Attach files">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                </button>
                                <button class="icon-btn" id="s-attach-img-btn" title="Attach images">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                </button>
                                <input id="s-file-in" type="file" multiple hidden>
                                <input id="s-img-in" type="file" accept="image/*" multiple hidden>
                            </div>
                            <button class="btn btn-primary btn-sm" id="s-send-btn">Send</button>
                        </div>
                    </div>
                    <div id="s-items" class="timeline"></div>
                </div>
            </section>

            <!-- Session Receive -->
            <section class="panel fade-in hidden" id="s-recv">
                <div id="sr-join" class="card">
                    <label class="label">Enter Session Code</label>
                    <div class="row gap">
                        <input id="sr-code" class="code-input" type="text" maxlength="8" placeholder="A7F3K9">
                        <button class="btn btn-primary" id="sr-join-btn">Join</button>
                    </div>
                </div>
                <div id="sr-error" class="error-card hidden mt"></div>
                <div id="sr-active" class="hidden">
                    <div class="card row spread">
                        <div class="row gap-sm">
                            <span class="badge green" id="sr-status">ACTIVE</span>
                            <span class="muted" id="sr-count"></span>
                        </div>
                        <div class="row gap-sm">
                            <span class="muted">Expires in <strong id="sr-timer"></strong></span>
                            <button class="btn-link sm" id="sr-leave-btn">Leave</button>
                        </div>
                    </div>
                    <div id="sr-closed" class="error-card center-content hidden mt">
                        <p><strong>Session closed by sender.</strong></p>
                        <button class="btn-link" id="sr-closed-leave">Leave</button>
                    </div>
                    <div id="sr-items" class="timeline"></div>
                </div>
            </section>
        </div>

        <!-- ==================== SPACE MODE ==================== -->
        <div class="view hidden" id="view-space">
            <!-- Composer -->
            <div class="composer">
                <textarea id="sp-text" class="composer-text" rows="2" placeholder="Add text to your space..."></textarea>
                <div id="sp-attachments" class="attach-bar hidden"></div>
                <div class="composer-toolbar">
                    <div class="toolbar-left">
                        <button class="icon-btn" id="sp-attach-file-btn" title="Attach files">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        </button>
                        <button class="icon-btn" id="sp-attach-img-btn" title="Attach images">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        </button>
                        <input id="sp-file-in" type="file" multiple hidden>
                        <input id="sp-img-in" type="file" accept="image/*" multiple hidden>
                    </div>
                    <button class="btn btn-primary btn-sm" id="sp-send-btn">Add</button>
                </div>
            </div>
            <!-- Items -->
            <div id="sp-items" class="timeline" style="margin-top:16px"></div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="auth-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <nav class="pill-group" id="auth-nav">
                    <button class="pill active" data-tab="auth-login-form">Login</button>
                    <button class="pill" data-tab="auth-reg-form">Register</button>
                </nav>
                <button class="modal-close" id="auth-close">&times;</button>
            </div>
            <form id="auth-login-form" class="modal-body" autocomplete="off">
                <div class="form-group">
                    <label class="label">Username</label>
                    <input class="input" type="text" id="login-user" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label class="label">Password</label>
                    <input class="input" type="password" id="login-pass" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary full">Sign In</button>
                <div id="login-error" class="error-card hidden mt"></div>
            </form>
            <form id="auth-reg-form" class="modal-body hidden" autocomplete="off">
                <div class="form-group">
                    <label class="label">Username</label>
                    <input class="input" type="text" id="reg-user" placeholder="3-50 characters" required>
                </div>
                <div class="form-group">
                    <label class="label">Password</label>
                    <input class="input" type="password" id="reg-pass" placeholder="At least 6 characters" required>
                </div>
                <button type="submit" class="btn btn-primary full">Create Account</button>
                <div id="reg-error" class="error-card hidden mt"></div>
                <div id="reg-ok" class="success-card hidden mt"></div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/js/app.js"></script>
</body>
</html>
