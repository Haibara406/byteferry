name: ByteFerry CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*", "release-*" ]
  workflow_dispatch: {}

env:
  REGISTRY: docker.io
  IMAGE_NAME: haibaraiii/byteferry
  CONTAINER_NAME: byteferry
  SSH_HOST: 154.94.235.178
  SSH_USER: root
  APP_PORT: "8076"
  VOLUME_DATA_DIR: /root/.byteferry/files

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Check SSH_PRIVATE_KEY exists
        if: ${{ secrets.SSH_PASSWORD == '' }}
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY is not set"
            exit 1
          else
            echo "SSH_PRIVATE_KEY is set"
          fi

      - name: Start ssh-agent and add private key
        if: ${{ secrets.SSH_PASSWORD == '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Remote deploy over SSH
        if: ${{ secrets.SSH_PASSWORD == '' }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          VOLUME_DATA_DIR: ${{ env.VOLUME_DATA_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=yes ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
          set -e
          echo "Pulling image..."
          docker pull ${REGISTRY}/${IMAGE_NAME}:latest

          if [ "$(docker ps -aq -f name=${CONTAINER_NAME})" ]; then
            if [ "$(docker ps -q -f name=${CONTAINER_NAME})" ]; then
              docker stop ${CONTAINER_NAME}
            fi
            docker rm ${CONTAINER_NAME}
          fi

          mkdir -p ${VOLUME_DATA_DIR}

          docker run -d --name ${CONTAINER_NAME} \
            -p ${APP_PORT}:${APP_PORT} \
            -v ${VOLUME_DATA_DIR}:${VOLUME_DATA_DIR} \
            --restart unless-stopped \
            ${REGISTRY}/${IMAGE_NAME}:latest

          echo "Verifying container status..."
          docker ps --filter "name=${CONTAINER_NAME}"
          EOF

      - name: Remote deploy over SSH (password option)
        if: ${{ secrets.SSH_PASSWORD != '' }}
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -e
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            if [ "$(docker ps -aq -f name=${{ env.CONTAINER_NAME }})" ]; then
              if [ "$(docker ps -q -f name=${{ env.CONTAINER_NAME }})" ]; then
                docker stop ${{ env.CONTAINER_NAME }}
              fi
              docker rm ${{ env.CONTAINER_NAME }}
            fi
            mkdir -p ${{ env.VOLUME_DATA_DIR }}
            docker run -d --name ${{ env.CONTAINER_NAME }} \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              -v ${{ env.VOLUME_DATA_DIR }}:${{ env.VOLUME_DATA_DIR }} \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker ps --filter "name=${{ env.CONTAINER_NAME }}"

      - name: Health check (HTTP)
        run: |
          sleep 5
          curl -sf --retry 5 --retry-delay 3 http://${{ env.SSH_HOST }}:${{ env.APP_PORT }} || exit 1
