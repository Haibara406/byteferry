# Nginx 配置文件
# 保存到 /etc/nginx/sites-available/minio-cdn

server {
    listen 80;
    server_name minio-cdn.haikari.top;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name minio-cdn.haikari.top;

    # SSL 证书配置（使用 Let's Encrypt 或其他证书）
    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 客户端最大上传大小
    client_max_body_size 100M;

    # 反向代理到 MinIO
    location / {
        proxy_pass http://154.94.235.178:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓冲以支持大文件上传
        proxy_buffering off;
        proxy_request_buffering off;

        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # 日志
    access_log /var/log/nginx/minio-cdn-access.log;
    error_log /var/log/nginx/minio-cdn-error.log;
}
