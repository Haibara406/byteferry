# ByteFerry custom config
byteferry:
  storage:
    file-dir: ${user.home}/.byteferry/files/
  share:
    default-expire-seconds: 600
    code-length: 6
  session:
    default-expire-seconds: 1800
  jwt:
    secret: ByteFerrySecretKey2026ForJwtTokenGenerationAndValidation
    expiration-hours: 72
