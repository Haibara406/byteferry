spring:
  application:
    name: ByteFerry

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: "Ww249260523.."

  # MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/byteferry?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "Ww249260523.."
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # File upload
  servlet:
    multipart:
